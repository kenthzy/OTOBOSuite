<VirtualHost *:80>
    ServerName otobo.example.com
    DocumentRoot /opt/otobo/var/httpd/htdocs

    <Directory /opt/otobo/var/httpd/htdocs>
        Require all granted
    </Directory>

    <LocationMatch /otobo>
        ProxyPass fcgi://127.0.0.1:5000/
    </LocationMatch>

    ErrorLog ${APACHE_LOG_DIR}/otobo-error.log
    CustomLog ${APACHE_LOG_DIR}/otobo-access.log combined
</VirtualHost>
