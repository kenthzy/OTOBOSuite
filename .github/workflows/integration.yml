name: Integration

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Run lint
        run: make check

  install:
    runs-on: ubuntu-24.04
    needs: lint
    strategy:
      matrix:
        db: [mariadb, postgresql]
        web: [apache, nginx]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-server postgresql curl wget perl

      - name: Start databases
        run: |
          sudo systemctl start mariadb
          sudo systemctl start postgresql

      - name: Create CI config (MariaDB + ${{ matrix.web }})
        if: matrix.db == 'mariadb'
        run: |
          sudo mkdir -p /etc
          sudo tee /etc/otobo-installer.conf <<'EOF'
          FQDN=otobo-ci.example.com
          DB_ENGINE=mariadb
          DB_NAME=otobo_ci
          DB_USER=otobo_ci
          DB_PASS=ci_secret_2026
          ADMIN_USER=admin@localhost
          ADMIN_PASS=admin_ci_2026
          ADMIN_EMAIL=ci@example.com
          WEB_SERVER=${{ matrix.web }}
          SSL_MODE=none
          INSTALL_AI=no
          INSTALL_HARDENING=no
          INSTALL_MONITORING=no
          OTOBO_ROOT=/opt/otobo
          OTOBO_USER=otobo
          OTOBO_GROUP=www-data
          EOF

      - name: Create CI config (PostgreSQL + ${{ matrix.web }})
        if: matrix.db == 'postgresql'
        run: |
          sudo mkdir -p /etc
          sudo tee /etc/otobo-installer.conf <<'EOF'
          FQDN=otobo-ci.example.com
          DB_ENGINE=postgresql
          DB_NAME=otobo_ci
          DB_USER=otobo_ci
          DB_PASS=ci_secret_2026
          ADMIN_USER=admin@localhost
          ADMIN_PASS=admin_ci_2026
          ADMIN_EMAIL=ci@example.com
          WEB_SERVER=${{ matrix.web }}
          SSL_MODE=none
          INSTALL_AI=no
          INSTALL_HARDENING=no
          INSTALL_MONITORING=no
          OTOBO_ROOT=/opt/otobo
          OTOBO_USER=otobo
          OTOBO_GROUP=www-data
          EOF

      - name: Run install.sh
        run: |
          sudo bash install.sh --unattended --config /etc/otobo-installer.conf 2>&1 | tee /tmp/install.log
        timeout-minutes: 30

      - name: Verify installation
        run: |
          sudo bash verify.sh 2>&1 | tee /tmp/verify.log

      - name: Check verify results
        run: |
          if grep -q "FAIL" /tmp/verify.log; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✅ All checks passed"

      - name: Save install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-log-${{ matrix.db }}-${{ matrix.web }}
          path: /tmp/install.log

      - name: Save verify log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-log-${{ matrix.db }}-${{ matrix.web }}
          path: /tmp/verify.log

  upgrade:
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Run upgrade check
        run: |
          sudo bash upgrade.sh --check 2>&1 | tee /tmp/upgrade-check.log

      - name: Verify upgrade check has no errors
        run: |
          if grep -qi "fatal\|error" /tmp/upgrade-check.log; then
            echo "❌ Upgrade check had errors"
            exit 1
          fi
          echo "✅ Upgrade check passed"

  repair:
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Run repair check
        run: |
          sudo bash repair.sh --check 2>&1 | tee /tmp/repair-check.log

      - name: Verify repair check
        run: |
          if grep -q "FAIL" /tmp/repair-check.log; then
            echo "❌ Repair found failures"
            exit 1
          fi
          echo "✅ Repair check passed"

  uninstall:
    runs-on: ubuntu-24.04
    needs: install
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Uninstall OTOBO
        run: |
          sudo bash uninstall.sh --full 2>&1 | tee /tmp/uninstall.log

      - name: Verify uninstall
        run: |
          if [ -d /opt/otobo ]; then
            echo "❌ OTOBO still present after uninstall"
            exit 1
          fi
          echo "✅ Uninstall successful"
